<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Rural Bank of San Rafael</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Merriweather', serif; }
        .bg-brand-green { background-color: #004d00; }
        .text-brand-green { color: #004d00; }
        .text-brand-yellow { color: #f2c700; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

<header class="bg-brand-green shadow-lg">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
        <a href="index.html" class="flex items-center text-brand-yellow font-bold">
            <img src="277570418_377604507712528_8014509792721781536_n.jpg" class="h-10 w-10 mr-2 rounded-md">
            <span>Rural Bank of San Rafael</span>
        </a>
        <nav class="flex items-center space-x-4 text-white">
            <a href="careers.html" class="hover:text-brand-yellow">Careers</a>
            <a href="real-and-other-properties-acquired.html" class="hover:text-brand-yellow">Properties</a>
            <a href="#" class="hover:text-brand-yellow" data-auth-link>Logout</a>
        </nav>
    </div>
</header>

<main class="py-12 px-4">
    <section class="max-w-6xl mx-auto">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
            <div class="bg-brand-green px-8 py-10 text-white">
                <h1 class="text-3xl md:text-4xl font-black">Administrator Panel</h1>
                <p class="mt-3 text-green-100">Create and manage staff accounts, and decide which sections each user can edit.</p>
            </div>

            <div class="p-8 md:p-10 grid gap-8 lg:grid-cols-[0.9fr_1.1fr]">
                <div class="rounded-2xl border border-gray-200 bg-gray-50 p-6">
                    <h2 id="user-form-title" class="text-xl font-bold text-brand-green mb-4">Add a User</h2>
                    <form id="user-form" class="space-y-4">
                        <input id="user-username" type="text" required class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-yellow-400" placeholder="Username">
                        <input id="user-password" type="password" class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-yellow-400" placeholder="Password (leave blank to keep current password)">
                        <select id="user-role" class="w-full rounded-xl border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-yellow-400">
                            <option value="custom">Custom Access</option>
                            <option value="admin">Administrator</option>
                            <option value="careers">Careers Manager</option>
                            <option value="properties">Properties Manager</option>
                        </select>

                        <div class="rounded-xl border border-gray-200 bg-white p-4">
                            <p class="text-sm font-semibold text-gray-700 mb-3">Permissions</p>
                            <div class="space-y-2 text-sm text-gray-700">
                                <label class="flex items-center gap-2"><input type="checkbox" value="careers" class="user-permission"> Manage Careers</label>
                                <label class="flex items-center gap-2"><input type="checkbox" value="properties" class="user-permission"> Manage Properties</label>
                                <label class="flex items-center gap-2"><input type="checkbox" value="admin" class="user-permission"> Admin Panel</label>
                            </div>
                        </div>

                        <div class="flex flex-wrap gap-3">
                            <button type="submit" class="rounded-xl bg-brand-green px-5 py-3 font-bold text-white hover:bg-green-800 transition">Save User</button>
                            <button id="cancel-edit-user" type="button" class="hidden rounded-xl border border-gray-300 px-5 py-3 font-bold text-gray-700 hover:bg-gray-100 transition">Cancel</button>
                        </div>
                    </form>
                </div>

                <div>
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-bold text-brand-green">Existing Users</h2>
                        <p id="admin-status" class="text-sm text-gray-600"></p>
                    </div>
                    <div id="user-list" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </section>
</main>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-analytics.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="auth.js"></script>
<script>
    let editingUsername = null;

    function getUsers() {
        try {
            const saved = localStorage.getItem('rbsrUsers');
            return saved ? JSON.parse(saved) : [];
        } catch (error) {
            return [];
        }
    }

    function saveUsers(users) {
        localStorage.setItem('rbsrUsers', JSON.stringify(users));
    }

    function getSelectedPermissions() {
        return Array.from(document.querySelectorAll('.user-permission:checked')).map(function (checkbox) {
            return checkbox.value;
        });
    }

    function setPermissionCheckboxes(permissions) {
        const boxes = document.querySelectorAll('.user-permission');
        boxes.forEach(function (box) {
            box.checked = (permissions || []).includes(box.value);
        });
    }

    function renderUsers() {
        const list = document.getElementById('user-list');
        const users = getUsers();
        const currentUser = window.rbsrAuth.getCurrentUser();

        if (!list) return;

        if (!users.length) {
            list.innerHTML = '<div class="rounded-2xl border border-dashed border-gray-300 p-6 text-center text-gray-500">No users yet.</div>';
            return;
        }

        list.innerHTML = users.map(function (user) {
            const permissions = Array.isArray(user.permissions) ? user.permissions : [];
            const permissionText = permissions.length ? permissions.join(', ') : 'No custom access';
            const canDelete = user.username !== currentUser.username;

            return '<div class="rounded-2xl border border-gray-200 bg-white p-4 shadow-sm">' +
                '<div class="flex items-start justify-between gap-3">' +
                '<div>' +
                '<p class="font-bold text-brand-green">' + user.username + '</p>' +
                '<p class="text-sm text-gray-600">Role: ' + (user.role || 'custom') + '</p>' +
                '<p class="text-sm text-gray-600">Access: ' + permissionText + '</p>' +
                '</div>' +
                '<div class="flex gap-2">' +
                '<button type="button" class="edit-user rounded-lg bg-yellow-400 px-3 py-2 text-sm font-semibold text-green-900" data-username="' + user.username + '">Edit</button>' +
                (canDelete ? '<button type="button" class="delete-user rounded-lg bg-red-600 px-3 py-2 text-sm font-semibold text-white" data-username="' + user.username + '">Delete</button>' : '') +
                '</div>' +
                '</div>' +
                '</div>';
        }).join('');
    }

    function resetUserForm() {
        const form = document.getElementById('user-form');
        const title = document.getElementById('user-form-title');
        const cancelButton = document.getElementById('cancel-edit-user');
        if (form) {
            form.reset();
        }
        if (title) {
            title.textContent = 'Add a User';
        }
        if (cancelButton) {
            cancelButton.classList.add('hidden');
        }
        editingUsername = null;
    }

    document.addEventListener('DOMContentLoaded', async function () {
        const form = document.getElementById('user-form');
        const list = document.getElementById('user-list');
        const cancelButton = document.getElementById('cancel-edit-user');
        const status = document.getElementById('admin-status');

        if (!window.rbsrAuth.isLoggedIn() || !window.rbsrAuth.isAdmin()) {
            window.location.href = 'login.html';
            return;
        }

        if (status) {
            status.textContent = 'Signed in as ' + window.rbsrAuth.getCurrentUser().username;
        }

        renderUsers();

        if (cancelButton) {
            cancelButton.addEventListener('click', function () {
                resetUserForm();
            });
        }

        if (list) {
            list.addEventListener('click', async function (event) {
                const editButton = event.target.closest('.edit-user');
                const deleteButton = event.target.closest('.delete-user');

                if (editButton) {
                    const username = editButton.getAttribute('data-username');
                    const users = getUsers();
                    const user = users.find(function (item) {
                        return item.username === username;
                    });

                    if (user) {
                        document.getElementById('user-username').value = user.username;
                        document.getElementById('user-password').value = '';
                        document.getElementById('user-role').value = user.role || 'custom';
                        setPermissionCheckboxes(user.permissions || []);
                        document.getElementById('user-form-title').textContent = 'Edit User';
                        document.getElementById('cancel-edit-user').classList.remove('hidden');
                        editingUsername = user.username;
                    }
                }

                if (deleteButton) {
                    const username = deleteButton.getAttribute('data-username');
                    const users = getUsers();
                    const currentUser = window.rbsrAuth.getCurrentUser();

                    if (username === currentUser.username) {
                        alert('You cannot delete your own account.');
                        return;
                    }

                    const updatedUsers = users.filter(function (item) {
                        return item.username !== username;
                    });
                    saveUsers(updatedUsers);
                    await window.rbsrAuth.deleteUser(username);
                    await window.rbsrAuth.loadUsers();
                    renderUsers();
                }
            });
        }

        if (form) {
            form.addEventListener('submit', async function (event) {
                event.preventDefault();
                const username = document.getElementById('user-username').value.trim();
                const password = document.getElementById('user-password').value;
                const role = document.getElementById('user-role').value;
                const permissions = getSelectedPermissions();

                if (!username) {
                    return;
                }

                const users = getUsers();
                const existingUserIndex = users.findIndex(function (item) {
                    return item.username === username;
                });

                const normalizedRole = role === 'admin' ? 'admin' : role === 'careers' ? 'careers' : role === 'properties' ? 'properties' : 'custom';
                const normalizedPermissions = normalizedRole === 'admin'
                    ? ['admin', 'careers', 'properties']
                    : normalizedRole === 'careers'
                        ? ['careers']
                        : normalizedRole === 'properties'
                            ? ['properties']
                            : permissions;

                const userPayload = {
                    username: username,
                    role: normalizedRole,
                    permissions: normalizedPermissions
                };

                if (password) {
                    userPayload.password = password;
                } else if (editingUsername && existingUserIndex >= 0) {
                    userPayload.password = users[existingUserIndex].password;
                }

                if (editingUsername && existingUserIndex >= 0) {
                    users[existingUserIndex] = userPayload;
                } else {
                    users.push(userPayload);
                }

                saveUsers(users);
                await window.rbsrAuth.saveUser(userPayload);
                resetUserForm();
                renderUsers();
            });
        }
    });
</script>
</body>
</html>
